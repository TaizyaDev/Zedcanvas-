{% extends "base.html" %}
{% block title %}Create Challenge — ZedCanvas{% endblock %}

{% block content %}

<div style="font-family:'Bebas Neue',sans-serif;font-size:1.5rem;
            letter-spacing:0.08em;margin-bottom:1.25rem;">
  New Challenge 🎭
</div>

<div class="card" style="padding:1.5rem;">
  <form method="POST" action="{{ url_for('create_challenge') }}">

    <div class="form-group">
      <label class="form-label">Challenge Title *</label>
      <input type="text" name="title" class="form-input"
             placeholder='e.g. "Paint Zambia"' required/>
    </div>

    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea name="description" class="form-input" rows="3"
                placeholder="Describe the theme, rules and what you're looking for..."></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">Art Category</label>
      <select name="category" class="form-input">
        <option value="">— Any style —</option>
        {% for cat in categories %}
          <option value="{{ cat }}">{{ cat }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Prize / Recognition</label>
      <input type="text" name="prize" class="form-input"
             placeholder='e.g. "Featured on ZedCanvas homepage + Trophy badge"'/>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
      <div class="form-group">
        <label class="form-label">Start Date *</label>
        <input type="date" name="start_date" class="form-input" required/>
      </div>
      <div class="form-group">
        <label class="form-label">End Date *</label>
        <input type="date" name="end_date" class="form-input" required/>
      </div>
    </div>

    <button type="submit" class="btn btn-black btn-full">
      Launch Challenge 🚀
    </button>
    <a href="{{ url_for('challenges') }}"
       class="btn btn-outline btn-full" style="margin-top:0.5rem;">
      Cancel
    </a>
  </form>
</div>

{% endblock %}
