<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — ZedCanvas</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root { --black:#0a0a0a; --white:#f8f8f8; --gray4:#888; --gray6:#e2e2e2; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'DM Sans',sans-serif; background:var(--black); min-height:100vh;
           display:flex; align-items:center; justify-content:center; padding:1.5rem; }
    .box { background:var(--white); border-radius:16px; padding:2.5rem 1.75rem;
           width:100%; max-width:380px; }
    .logo { font-family:'Bebas Neue',sans-serif; font-size:2.5rem; letter-spacing:0.05em;
            text-align:center; margin-bottom:0.25rem; }
    .subtitle { text-align:center; color:var(--gray4); font-size:0.85rem; margin-bottom:2rem; }
    .flash { padding:0.7rem 1rem; border-radius:8px; font-size:0.85rem;
             font-weight:500; margin-bottom:0.75rem; }
    .flash.error { background:#fee2e2; color:#b91c1c; border:1px solid #fecaca; }
    .flash.success { background:#f0fdf4; color:#166534; border:1px solid #bbf7d0; }
    .form-group { margin-bottom:1rem; }
    label { display:block; font-size:0.72rem; font-weight:600; letter-spacing:0.08em;
            text-transform:uppercase; color:var(--gray4); margin-bottom:0.35rem; }
    input { width:100%; padding:0.8rem 1rem; border:1.5px solid var(--gray6);
            border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.95rem;
            background:#fff; color:var(--black); transition:border-color 0.2s; -webkit-appearance:none; }
    input:focus { outline:none; border-color:var(--black); }
    .btn { width:100%; padding:0.85rem; border-radius:10px; border:none;
           background:var(--black); color:var(--white); font-family:'DM Sans',sans-serif;
           font-size:0.95rem; font-weight:700; cursor:pointer; margin-top:0.5rem; }
    .btn:hover { background:#222; }
    .signup-link { text-align:center; font-size:0.85rem; color:var(--gray4); margin-top:1.25rem; }
    .signup-link a { color:var(--black); font-weight:600; text-decoration:none; }
    .back-link { display:block; text-align:center; font-size:0.8rem;
                 color:var(--gray4); margin-top:1rem; text-decoration:none; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">ZedCanvas</div>
    <div class="subtitle">Welcome back 🎨</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash {{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label>Email or Username</label>
        <input type="text" name="login_id" placeholder="your@email.com or @username" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Your password" required/>
      </div>
      <button class="btn" type="submit">Sign In</button>
    </form>

    <div class="signup-link">
      Don't have an account? <a href="{{ url_for('signup') }}">Join ZedCanvas</a>
    </div>
    <div style="text-align:center; margin-top:0.75rem;">
      <a href="{{ url_for('forgot_password') }}"
         style="font-size:0.82rem; color:#888; text-decoration:none;">
        Forgot your password?
      </a>
    </div>
    <a href="{{ url_for('index') }}" class="back-link">← Back to home</a>
  </div>
</body>
</html>
