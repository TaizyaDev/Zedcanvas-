{% extends "base.html" %}
{% block title %}Create Event — ZedCanvas{% endblock %}
{% block content %}

<div style="font-family:'Bebas Neue',sans-serif;font-size:1.5rem;
            letter-spacing:0.08em;margin-bottom:1.25rem;">
  New Event 📅
</div>

<div class="card" style="padding:1.5rem;">
  <form method="POST" action="{{ url_for('create_event') }}">

    <div class="form-group">
      <label class="form-label">Event Title *</label>
      <input type="text" name="title" class="form-input"
             placeholder='e.g. "Lusaka Art Night — Open Exhibition"' required/>
    </div>

    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea name="description" class="form-input" rows="3"
                placeholder="What's happening? What should people expect?"></textarea>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
      <div class="form-group">
        <label class="form-label">Date *</label>
        <input type="date" name="date" class="form-input" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Time</label>
        <input type="time" name="time" class="form-input"/>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Venue / Location</label>
      <input type="text" name="location" class="form-input"
             placeholder='e.g. "Lusaka National Museum"'/>
    </div>

    <div class="form-group">
      <label class="form-label">City</label>
      <select name="city" class="form-input">
        <option value="">— Select city —</option>
        <option value="Lusaka">Lusaka</option>
        <option value="Ndola">Ndola</option>
        <option value="Livingstone">Livingstone</option>
        <option value="Kitwe">Kitwe</option>
        <option value="Kabwe">Kabwe</option>
        <option value="Chipata">Chipata</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <button type="submit" class="btn btn-black btn-full">Create Event 📅</button>
    <a href="{{ url_for('events') }}" class="btn btn-outline btn-full" style="margin-top:0.5rem;">
      Cancel
    </a>
  </form>
</div>

{% endblock %}
